<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EFES Restaurant Menu</title>

  <style>
    :root {
      --bg: #f3ead6;
      --paper: #fbf4df;
      --navy: #10243f;
      --gold: #b48a42;
      --brown: #5b3b1e;
      --muted: #7a6a58;
      --line: rgba(16, 36, 63, 0.18);
      --white: #ffffff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      background:
        radial-gradient(circle at top, rgba(255,255,255,0.6), transparent 35%),
        linear-gradient(180deg, #f7efd9, #eadbbd);
      color: var(--navy);
    }

    .app {
      max-width: 520px;
      margin: 0 auto;
      min-height: 100vh;
      background: var(--paper);
      border-left: 1px solid rgba(0,0,0,0.08);
      border-right: 1px solid rgba(0,0,0,0.08);
      box-shadow: 0 0 35px rgba(0,0,0,0.14);
    }

    header {
      position: sticky;
      top: 0;
      z-index: 20;
      background: rgba(251, 244, 223, 0.96);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--line);
      padding: 18px 18px 12px;
      text-align: center;
    }

    .brand {
      letter-spacing: 10px;
      font-size: 42px;
      line-height: 1;
      font-weight: 700;
    }

    .subtitle {
      margin-top: 4px;
      letter-spacing: 5px;
      font-size: 13px;
      color: var(--brown);
    }

    .main-tabs {
      display: flex;
      gap: 8px;
      padding: 14px 14px 8px;
      overflow-x: auto;
      background: var(--paper);
    }

    .main-tabs button,
    .category-tabs button {
      border: 1px solid rgba(16, 36, 63, 0.22);
      background: #fff7df;
      color: var(--navy);
      padding: 10px 14px;
      border-radius: 999px;
      font-family: inherit;
      font-weight: 700;
      white-space: nowrap;
      cursor: pointer;
    }

    .main-tabs button.active,
    .category-tabs button.active {
      background: var(--navy);
      color: var(--white);
      border-color: var(--navy);
    }

    .category-tabs {
      display: flex;
      gap: 8px;
      padding: 0 14px 14px;
      overflow-x: auto;
      border-bottom: 1px solid var(--line);
    }

    .hero {
      margin: 16px;
      padding: 26px 18px;
      border: 1px solid rgba(180, 138, 66, 0.45);
      border-radius: 18px;
      background:
        linear-gradient(rgba(16,36,63,0.12), rgba(16,36,63,0.05)),
        radial-gradient(circle at top left, rgba(180,138,66,0.22), transparent 40%),
        #f7ecd0;
      text-align: center;
    }

    .hero h1 {
      margin: 0;
      font-size: 26px;
      letter-spacing: 3px;
    }

    .hero p {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.4;
    }

    .search-box {
      padding: 0 16px 14px;
    }

    .search-box input {
      width: 100%;
      padding: 13px 14px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: #fffaf0;
      font-family: inherit;
      font-size: 15px;
      outline: none;
    }

    .section-title {
      margin: 8px 16px 10px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--line);
      font-size: 22px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .menu-list {
      padding: 0 14px 24px;
    }

    .item {
      display: grid;
      grid-template-columns: 82px 1fr;
      gap: 12px;
      padding: 12px;
      margin-bottom: 12px;
      background: rgba(255, 250, 240, 0.76);
      border: 1px solid rgba(16, 36, 63, 0.12);
      border-radius: 16px;
      cursor: pointer;
    }

  .item-img {
  width: 82px;
  height: 82px;
  border-radius: 14px;
  background: transparent;
  border: 1px solid rgba(16, 36, 63, 0.12);
  overflow: hidden;
}

    .item-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .item-main {
      min-width: 0;
    }

    .item-top {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: flex-start;
    }

    .item-name {
      font-size: 17px;
      font-weight: 700;
      color: var(--navy);
    }

    .item-price {
      max-width: 48%;
      font-size: 15px;
      font-weight: 700;
      color: var(--brown);
      text-align: right;
      white-space: normal;
      line-height: 1.3;
    }

    .item-desc {
      margin-top: 5px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.35;
      font-style: italic;
    }

    .badge {
      display: inline-block;
      margin-top: 8px;
      padding: 4px 8px;
      border-radius: 999px;
      background: rgba(180, 138, 66, 0.16);
      color: var(--brown);
      font-size: 11px;
      font-weight: 700;
    }

    footer {
      text-align: center;
      padding: 24px 16px 34px;
      color: var(--muted);
      font-size: 12px;
      border-top: 1px solid var(--line);
    }

    .modal {
      position: fixed;
      inset: 0;
      display: none;
      align-items: flex-end;
      background: rgba(0,0,0,0.52);
      z-index: 50;
    }

    .modal.open {
      display: flex;
    }

    .modal-card {
      width: 100%;
      max-width: 520px;
      margin: 0 auto;
      background: var(--paper);
      border-radius: 22px 22px 0 0;
      padding: 18px;
      animation: rise .18s ease-out;
    }

    @keyframes rise {
      from { transform: translateY(24px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .modal-img {
      width: 100%;
      height: 190px;
      border-radius: 16px;
      background:
        radial-gradient(circle at 30% 30%, #d6a85f, transparent 35%),
        linear-gradient(135deg, #6b321d, #d9a755);
      margin-bottom: 14px;
      overflow: hidden;
    }

    .modal-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .modal h2 {
      margin: 0;
      font-size: 24px;
    }

    .modal .price {
      margin: 8px 0;
      font-size: 20px;
      font-weight: 700;
      color: var(--brown);
    }

    .modal p {
      color: var(--muted);
      line-height: 1.5;
      margin-bottom: 16px;
    }

    .close-btn {
      width: 100%;
      border: none;
      background: var(--navy);
      color: white;
      padding: 13px;
      border-radius: 12px;
      font-family: inherit;
      font-weight: 700;
      font-size: 15px;
      cursor: pointer;
    }
  </style>
</head>

    let currentMain = "Main Menu";
    let currentCategory = "Chef's Choice Soup";
    let searchTerm = "";

    const mainTabs = document.getElementById("mainTabs");
    const categoryTabs = document.getElementById("categoryTabs");
    const menuList = document.getElementById("menuList");
    const heroTitle = document.getElementById("heroTitle");
    const heroText = document.getElementById("heroText");
    const sectionTitle = document.getElementById("sectionTitle");
    const searchInput = document.getElementById("searchInput");

    function renderMainTabs() {
      mainTabs.innerHTML = "";
      Object.keys(MENU).forEach(main => {
        const btn = document.createElement("button");
        btn.textContent = main;
        btn.className = main === currentMain ? "active" : "";
        btn.onclick = () => {
          currentMain = main;
          currentCategory = Object.keys(MENU[currentMain].categories)[0];
          searchTerm = "";
          searchInput.value = "";
          render();
        };
        mainTabs.appendChild(btn);
      });
    }

    function renderCategoryTabs() {
      categoryTabs.innerHTML = "";
      Object.keys(MENU[currentMain].categories).forEach(cat => {
        const btn = document.createElement("button");
        btn.textContent = cat;
        btn.className = cat === currentCategory ? "active" : "";
        btn.onclick = () => {
          currentCategory = cat;
          render();
        };
        categoryTabs.appendChild(btn);
      });
    }

    function renderItems() {
      const items = MENU[currentMain].categories[currentCategory].filter(item => {
        const text = `${item.name} ${item.desc} ${item.tag}`.toLowerCase();
        return text.includes(searchTerm.toLowerCase());
      });

      menuList.innerHTML = "";

      if (items.length === 0) {
        menuList.innerHTML = `<p style="padding:16px;color:#7a6a58;">No item found.</p>`;
        return;
      }

      items.forEach(item => {
        const div = document.createElement("div");
        div.className = "item";
        div.onclick = () => openModal(item);

        div.innerHTML = `
          <div class="item-img">
            ${item.image ? `<img src="${item.image}" alt="${item.name}" loading="lazy" onerror="this.style.display=\'none\'">` : ""}
          </div>
          <div class="item-main">
            <div class="item-top">
              <div class="item-name">${item.name}</div>
              <div class="item-price">${item.price}</div>
            </div>
            ${item.desc ? `<div class="item-desc">${item.desc}</div>` : ""}
            ${item.tag ? `<span class="badge">${item.tag}</span>` : ""}
          </div>
        `;

        menuList.appendChild(div);
      });
    }

    function render() {
      heroTitle.textContent = currentMain.toUpperCase();
      heroText.textContent = MENU[currentMain].text;
      sectionTitle.textContent = currentCategory;
      renderMainTabs();
      renderCategoryTabs();
      renderItems();
    }

    searchInput.addEventListener("input", e => {
      searchTerm = e.target.value;
      renderItems();
    });

    function openModal(item) {
      document.getElementById("modalName").textContent = item.name;
      document.getElementById("modalPrice").textContent = item.price;
      document.getElementById("modalDesc").textContent = item.desc || "No description available.";

      const modalImage = document.getElementById("modalImage");
      modalImage.innerHTML = item.image ? `<img src="${item.image}" alt="${item.name}" onerror="this.style.display=\'none\'">` : "";

      document.getElementById("modal").classList.add("open");
    }

    function closeModal() {
      document.getElementById("modal").classList.remove("open");
    }

    document.getElementById("modal").addEventListener("click", function(e) {
      if (e.target.id === "modal") closeModal();
    });

    render();
  </script>
